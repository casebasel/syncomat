# Syncthing-Hub auf TrueNAS — 24/7 Cluster-Node + ZFS-Snapshot-Backup
# Vanilla Syncthing-Daemon (headless, KEIN Syncomat-GUI).
# Stil wie Marlons bestehende Stacks. Deploy via setup.sh (sudo).
name: syncthing-hub          # eindeutig -> kein Service-Override (Noa-Lehre)

services:
  syncthing:
    # WICHTIG: muss zur Syncomat-Sidecar-Version passen (aktuell v2.1.1).
    # Falls :2.1.1 nicht zieht -> :2 oder :latest (muss v2.x sein, nicht 1.x).
    image: syncthing/syncthing:2.1.1
    container_name: syncthing-hub
    hostname: truenas-hub               # so erscheint die Node im Cluster
    restart: unless-stopped

    # host-mode: noetig fuer lokale Discovery (21027/UDP) + Bind an LAN + ZeroTier
    network_mode: host

    environment:
      - PUID=3003                       # ndisplay -> darf in die Unreal-Datasets schreiben
      - PGID=3002                       # Gruppe ndisplay (group-writable)
      - TZ=Europe/Zurich
      # GUI an 0.0.0.0 -> erreichbar im Live-Netz (192.168.100.100) UND ueber
      # ZeroTier (192.168.191.17) fuers entfernte MacBook. KEIN Cloudflare-Tunnel noetig:
      # ZeroTier ist der sichere Fern-Pfad. setup.sh setzt automatisch ein GUI-Passwort.
      - STGUIADDRESS=0.0.0.0:8384

    volumes:
      # Identitaet/Keys/DB der Node — MUSS Redeploys ueberleben
      - /mnt/Apps/syncthing/config:/var/syncthing/config
      # Ziel-Dataset: bestehende Ordner liegen als /var/syncthing/data/<Projekt>
      - /mnt/tank/Syncthing:/var/syncthing/data
      # /mnt komplett -> Syncthing kann Ordner auf JEDEM Pool ablegen (synchub waehlt
      # den Ort: m2_4TB-SSD, tank-HDD, ...). Neue Pfade dann /mnt/<pool>/<dataset>/...
      - /mnt:/mnt
    # Bei network_mode: host KEIN ports-Block (sonst Compose-Fehler).
