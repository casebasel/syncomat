name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# Tauri-Action braucht write-Access um Release anzulegen + Assets zu uploaden.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          # windows-latest → windows-2025-vs2026 ab 15.06.2026; jetzt schon
          # explizit windows-2025 pinnen damit deterministisch.
          - platform: windows-2025
            target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      # v5 = Node-24-kompatibel (v4 wird ab 16.06.2026 deprecated)
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Fetch Syncthing sidecar binaries
        # Läuft auf macOS nativ; auf Windows via Git-Bash (bash + curl + unzip
        # sind alle in $PATH dank git installation auf windows-latest).
        # NB: binaries sind committed im repo, das script ist no-op wenn da.
        shell: bash
        run: bash scripts/fetch-syncthing.sh

      # GitHub Release CDN ist sporadisch flapping (504) — verhindert dass
      # tauri-bundler NSIS zur Build-Zeit selbst herunterlädt. Wir holen es
      # mit unserem eigenen Retry-Loop vor und legen es in den Pfad wo tauri-bundler
      # nach existing cache schaut.
      - name: Cache Tauri NSIS bundler resources
        if: matrix.platform == 'windows-2025'
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/tauri
          key: tauri-nsis-3.11-v1

      - name: Pre-fetch NSIS bundler (Windows-only, workaround for CDN-Flapping)
        if: matrix.platform == 'windows-2025'
        shell: bash
        run: |
          NSIS_DIR="$LOCALAPPDATA/tauri/NSIS"
          mkdir -p "$NSIS_DIR"
          if [ -d "$NSIS_DIR/nsis-3.11" ]; then
            echo "✓ NSIS cached"; exit 0
          fi
          URL="https://github.com/tauri-apps/binary-releases/releases/download/nsis-3.11/nsis-3.11.zip"
          for i in 1 2 3 4 5 6 7 8; do
            echo "attempt $i: $URL"
            if curl -fL --connect-timeout 30 --max-time 300 -o "$NSIS_DIR/nsis-3.11.zip" "$URL"; then
              echo "✓ downloaded, extracting…"
              (cd "$NSIS_DIR" && unzip -oq nsis-3.11.zip)
              break
            fi
            echo "  failed, sleeping $((i*30))s before retry"
            sleep $((i * 30))
          done
          ls "$NSIS_DIR/" || (echo "✗ NSIS dir empty after 8 attempts (~20min)"; exit 1)

      - name: Build + Release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Syncomat ${{ github.ref_name }}'
          releaseBody: |
            Auto-generated build.

            Installation: lade die .dmg + öffne sie. Beim ersten Start macOS bestätigt
            "Open from unknown developer" — Rechtsklick auf die App in /Applications und
            "Öffnen" wählen, dann nochmal "Öffnen" bestätigen.

            Automatische Updates ab dieser Version aktiv.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
